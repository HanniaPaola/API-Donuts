# Renombra la app tras: fly apps create <nombre>
app = "api-donuts"
primary_region = "iad"

[build]
  dockerfile = "Dockerfile"

[env]
  PORT = "8000"

[http_service]
  internal_port = 8000
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1

  [[http_service.checks]]
    interval = "30s"
    timeout = "10s"
    grace_period = "90s"
    method = "GET"
    path = "/health"

[[vm]]
  memory = "2gb"
  cpu_kind = "shared"
  cpus = 1

# Crear antes del primer deploy (misma región que primary_region):
#   fly volumes create mariadb_data --region iad --size 3
[[mounts]]
  source = "mariadb_data"
  destination = "/data"
